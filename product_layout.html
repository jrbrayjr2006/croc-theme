<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>
        <header>
            <div class="max-w-7xl mx-auto px-4 py-8 text-xl">This is a placeholder for the header!</div>
        </header>
        <main>
            <!-- Main Product Section -->
            <section>
                <div class="max-w-7xl mx-auto px-4 py-10">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-center">
                      
                        <!-- Left Image 1 -->
                        <div class="col-span-1">
                            <div class="h-48 rounded-xl overflow-hidden bg-gray-200">
                                <img src="https://via.placeholder.com/400x300"
                                    alt="Image 1"
                                    class="w-full h-full object-cover">
                            </div>
                        </div>
                    
                        <!-- Left Image 2 -->
                        <div class="col-span-1">
                            <div class="h-48 rounded-xl overflow-hidden bg-gray-200">
                                <img src="https://via.placeholder.com/400x300"
                                    alt="Image 2"
                                    class="w-full h-full object-cover">
                            </div>
                        </div>
                    
                        <!-- Right Content Area (spans 2 columns) -->
                        <div class="col-span-1 md:col-span-2 flex flex-col justify-center">
                            <h2 class="text-2xl font-bold mb-4">
                                Your Section Title
                            </h2>
                            
                            <p class="text-gray-600 mb-6">
                                This is a flexible content area where you can add descriptive text, 
                                marketing copy, or any supporting information alongside your images.
                            </p>
                        
                            <div class="flex flex-wrap gap-4">
                                <button class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                                Primary Action
                                </button>
                                <button class="px-5 py-2 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
                                Secondary Action
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!-- Upsell Section -->
            <section>
                <div class="max-w-7xl mx-auto px-4 py-8">
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                      
                      <!-- Image 1 -->
                      <div class="w-full h-48 bg-gray-200 rounded-xl overflow-hidden">
                        <img src="https://via.placeholder.com/400x300" 
                             alt="Image 1" 
                             class="w-full h-full object-cover">
                      </div>
                  
                      <!-- Image 2 -->
                      <div class="w-full h-48 bg-gray-200 rounded-xl overflow-hidden">
                        <img src="https://via.placeholder.com/400x300" 
                             alt="Image 2" 
                             class="w-full h-full object-cover">
                      </div>
                  
                      <!-- Image 3 -->
                      <div class="w-full h-48 bg-gray-200 rounded-xl overflow-hidden">
                        <img src="https://via.placeholder.com/400x300" 
                             alt="Image 3" 
                             class="w-full h-full object-cover">
                      </div>
                  
                      <!-- Image 4 -->
                      <div class="w-full h-48 bg-gray-200 rounded-xl overflow-hidden">
                        <img src="https://via.placeholder.com/400x300" 
                             alt="Image 4" 
                             class="w-full h-full object-cover">
                      </div>
                  
                    </div>
                </div>
            </section>
        </main>
        <!-- Footer area -->
        <footer></footer>
    </body>
</html>
